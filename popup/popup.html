<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AristAI</title>
  <style>
    :root {
      --bg: #f6f1e8;
      --card: #fffdf8;
      --ink: #171717;
      --muted: #6c6458;
      --line: rgba(33, 26, 18, 0.12);
      --shadow: 0 12px 30px rgba(40, 28, 16, 0.1);
    }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      width: 300px;
      padding: 16px;
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(214, 185, 141, 0.24), transparent 34%),
        linear-gradient(180deg, #faf6ef 0%, var(--bg) 100%);
      color: var(--ink);
    }
    h1 {
      font-size: 24px;
      margin: 0;
      letter-spacing: -0.03em;
    }
    p {
      font-size: 13px;
      color: var(--muted);
      margin: 8px 0 0;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      font-weight: 600;
    }
    label {
      display: block;
      font-size: 12px;
      margin-top: 12px;
      margin-bottom: 6px;
      color: #443f38;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 10px;
      border: 1px solid rgba(33, 26, 18, 0.14);
      border-radius: 12px;
      box-sizing: border-box;
      background: var(--card);
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      margin-top: 10px;
      white-space: pre-wrap;
      padding: 12px;
      background: rgba(255,255,255,0.7);
      border: 1px solid var(--line);
      border-radius: 14px;
      box-shadow: var(--shadow);
    }
    .hero {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(135deg, #fff8ef 0%, #f2e7d7 100%);
      border: 1px solid rgba(134, 92, 55, 0.14);
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }
    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(23, 23, 23, 0.08);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .form-card {
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.72);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>
  <div class="hero">
    <div>
      <h1>AristAI</h1>
      <p>Open the sidebar to manage your YouTube queue.</p>
    </div>
    <div class="badge">Local AI</div>
  </div>

  <div class="form-card">
    <label for="providerInput">AI Provider</label>
    <input id="providerInput" type="text" value="ollama" />
    <label for="baseUrlInput">Base URL</label>
    <input id="baseUrlInput" type="text" value="http://127.0.0.1:11434" />
    <label for="modelInput">Model</label>
    <input id="modelInput" type="text" value="qwen3:8b" />
    <label for="apiKeyInput">API Key</label>
    <input id="apiKeyInput" type="password" value="" placeholder="Only needed for OpenAI" />
    <label for="notebookTargetInput">Optional External App</label>
    <input id="notebookTargetInput" type="text" value="open-notebook" placeholder="open-notebook or google-notebooklm" />
    <label for="openNotebookUrlInput">Optional App URL</label>
    <input id="openNotebookUrlInput" type="text" value="http://localhost:8502" />
    <button id="openExternalAppBtn">Open External App</button>
    <button id="openSidebarBtn">Open Sidebar</button>
    <button id="saveSettingsBtn">Save AI Settings</button>
    <div id="settingsStatus" class="status">Provider: ollama
Model: qwen3:8b
Base URL: http://127.0.0.1:11434</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
